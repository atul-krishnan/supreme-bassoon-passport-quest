appId: com.passportquest.mobile.staging
---
- launchApp:
    clearState: true
- runFlow:
    when:
      visible: "Allow only while using the app"
    commands:
      - tapOn: "Allow only while using the app"
- runFlow:
    when:
      visible: "While using the app"
    commands:
      - tapOn: "While using the app"
- runFlow:
    when:
      visible: "Allow"
    commands:
      - tapOn: "Allow"
- runFlow:
    when:
      visible: "Pick your explorer name"
    commands:
      - tapOn: "e.g. atul_explorer"
      - eraseText
      - inputText: "qa_runner_android"
      - tapOn: "Start Questing"
- tapOn: "Quests"
- assertVisible: "Offline Sync"
- tapOn: "Social"
- assertVisible: "Social Feed"
- tapOn: "Profile"
- assertVisible: "Profile & Badges"
